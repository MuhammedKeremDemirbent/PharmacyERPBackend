<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eczane ERP</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #1a73e8;
            margin-bottom: 20px;
        }

        p {
            color: #5f6368;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            background-color: #1a73e8;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 0;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #1557b0;
        }

        .btn-secondary {
            background-color: #34a853;
        }

        .btn-secondary:hover {
            background-color: #2d8f47;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Eczane </h1>

        <a href="/inventory/medicines/" class="btn">İlaç Envanteri</a>
        <a href="/patients/" class="btn">Hasta Listesi</a>
        <a href="/procurement/" class="btn">Tedarikçiler</a>
        <a href="/admin/" class="btn btn-secondary">Yönetim Paneli</a>
    </div>
</body>

</html>
