#version: '3.8'

services:
  #VERİTABANI
  db:
    image: postgres:15
    container_name: eczane_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      #Depolama hafıza bölümü
      - postgres_data:/var/lib/postgresql/data # Veriler silinmesin diye koruma
    networks:
      - eczane-net

  #VERİTABANI YÖNETİM PANELİ
  pgadmin:
    image: dpage/pgadmin4
    container_name: eczane_admin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - eczane-net

  #DJANGO 
  backend:
    build: .
    container_name: eczane_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app # Bilgisayarındaki kod değişikliğini anında içeri aktarma (Hot Reload)
    env_file:
      - .env # .env dosyasındaki tüm değişkenleri içeri aktar
    ports:
      - "8000:8000"
    depends_on:
      - db # Veritabanı açılmadan backend çalışmasın
    networks:
      - eczane-net

  #REDIS CACHE
  redis:
    image: redis:7-alpine
    container_name: eczane_redis
    ports:
      - "6379:6379"
    networks:
      - eczane-net

  # CELERY WORKER 
  celery_worker:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env # Celery de mail şifrelerini bilmeli
    depends_on:
      - redis
      - db
    networks:
      - eczane-net

  # CELERY BEAT 
  celery_beat:
    build: .
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env # Beat de env'leri bilmeli
    depends_on:
      - redis
      - db
    networks:
      - eczane-net



  # MAILPIT SAHTE E-POSTA KUTUSU
  mailpit:
    image: axllent/mailpit
    container_name: eczane_mailpit
    ports:
      - "8025:8025" # Web Arayüzü (http://localhost:8025)
      - "1025:1025" # SMTP Portu (Django buraya atacak)
    networks:
      - eczane-net

  # FRONTEND
  frontend:
    build: C:\Users\kerem\Desktop\PharmacyERPFrontend\erp_frontend
    container_name: eczane_frontend
    volumes:
      - C:\Users\kerem\Desktop\PharmacyERPFrontend\erp_frontend:/app # Hot Reload için
      - /app/node_modules # node_modules'u volume'dan koru
    ports:
      - "3000:8080" # pgadmin zaten 8080'de, biz 3000'den erişiriz
    networks:
      - eczane-net

  # NGINX REVERSE PROXY
  nginx:
    image: nginx:alpine
    container_name: eczane_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - eczane-net

  # CLOUDFLARE TUNNEL
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: eczane_cloudflared
    restart: unless-stopped
    command: tunnel --url http://nginx:80
    depends_on:
      - nginx
    networks:
      - eczane-net

# OLUŞTURULACAK AĞLAR VE DEPOLAR
networks:
  eczane-net:
    driver: bridge

volumes:
  postgres_data:

    #https://submitted-computing-junior-roberts.trycloudflare.com
