upstream backend {
    server backend:8000;
}

# (İleride Frontend eklendiğinde buranın yorum satırını kaldırıp kullanabilirsiniz)
# upstream frontend {
#     server frontend:8080; 
# }

server {
    listen 80;

    # Django Admin ve Media/Static dosyaları için Route
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # API İstekleri için Route (/api/ önekini kaldırarak backend'e gönder)
    # Örnek: /api/token/ → backend:8000/token/
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API HARİCİ TÜM İSTEKLER (Burası Frontend İçindir)
    location / {
        proxy_pass http://frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
